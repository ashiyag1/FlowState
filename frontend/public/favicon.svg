<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Soft aesthetic warm background glow -->
  <circle cx="16" cy="16" r="14" fill="url(#bgGlow)" opacity="0.15" />
  
  <!-- Outer fine aesthetic circle -->
  <circle cx="16" cy="16" r="13" stroke="#c9933a" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.6" />

  <!-- Flowing waves (Tarang) -->
  <path d="M 6 22 C 10 20, 12 24, 16 22 C 20 20, 22 24, 26 22" stroke="#e8622a" stroke-width="1.2" stroke-linecap="round" />
  <path d="M 8 25.5 C 11 24, 13 27, 16 25.5 C 19 24, 21 27, 24 25.5" stroke="#c9933a" stroke-width="0.8" stroke-linecap="round" opacity="0.7" />

  <!-- Stylized Lotus (Mindfulness / FlowState) -->
  <!-- Central petal -->
  <path d="M 16 7 C 18 12, 18 17, 16 19 C 14 17, 14 12, 16 7 Z" fill="#e8622a" opacity="0.85" />
  
  <!-- Left petal -->
  <path d="M 16 11 C 12 12, 11 15, 12.5 17.5 C 14.5 18, 15.5 15, 16 11" fill="#c9933a" opacity="0.75" />
  <path d="M 16 11 C 12 12, 11 15, 12.5 17.5 C 14.5 18, 15.5 15, 16 11 Z" stroke="#c9933a" stroke-width="0.8" stroke-linejoin="round" />
  
  <!-- Right petal -->
  <path d="M 16 11 C 20 12, 21 15, 19.5 17.5 C 17.5 18, 16.5 15, 16 11" fill="#c9933a" opacity="0.75" />
  <path d="M 16 11 C 20 12, 21 15, 19.5 17.5 C 17.5 18, 16.5 15, 16 11 Z" stroke="#c9933a" stroke-width="0.8" stroke-linejoin="round" />
  
  <!-- Extreme left petal -->
  <path d="M 15 14 C 9 14.5, 9.5 18, 12.5 19 C 14 19, 14.5 17.5, 15 14 Z" stroke="#e8622a" stroke-width="0.8" opacity="0.8" />
  <!-- Extreme right petal -->
  <path d="M 17 14 C 23 14.5, 22.5 18, 19.5 19 C 18 19, 17.5 17.5, 17 14 Z" stroke="#e8622a" stroke-width="0.8" opacity="0.8" />

  <!-- Lotus Center Bindu (Glow) -->
  <circle cx="16" cy="14" r="1.5" fill="#fff" />
  <circle cx="16" cy="14" r="3" stroke="#e8622a" stroke-width="0.5" opacity="0.5" />

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8622a" />
      <stop offset="100%" stop-color="#c9933a" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>