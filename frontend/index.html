<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarang‑FlowState — Your Wellness Dashboard</title>
  <meta name="description" content="Track hydration, build habits, journal your journey. Your calm corner for living with intention." />

  <!-- DNS prefetch for font CDNs -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="dns-prefetch" href="https://fonts.cdnfonts.com" />

  <!-- Preconnect for faster TLS handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    Single consolidated Google Fonts request — all families in one URL.
    Replaces the three separate @import calls that were blocking rendering.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Lexend:wght@300;400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+Devanagari:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@200;300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Samarkan (CDN Fonts) — was previously injected by Navbar.jsx at runtime -->
  <link href="https://fonts.cdnfonts.com/css/samarkan" rel="stylesheet" />

  <!-- PWA & Mobile Web App meta tags -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1c1208" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FlowState" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="root">
    <!-- Instant breathing splash screen rendered before React JS loads -->
    <div id="instant-splash" style="
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #1b1208 0%, #0f0a05 100%);
      color: #fbf6ee;
      font-family: 'Lora', Georgia, serif;
      text-align: center;
    ">
      <style>
        @keyframes breatheSplash {
          0%, 100% { transform: scale(0.93); opacity: 0.65; }
          50% { transform: scale(1.07); opacity: 1; }
        }
        .breathing-lotus-splash {
          animation: breatheSplash 4s ease-in-out infinite;
        }
      </style>
      <div class="breathing-lotus-splash" style="width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; position: relative;">
        <div style="position: absolute; width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle, rgba(201, 147, 58, 0.16) 0%, transparent 70%); filter: blur(8px);"></div>
        <svg width="60" height="60" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 2 L23 11 C26 15 26 21 21 26 C18 29 14 29 11 26 C6 21 6 15 9 11 Z" stroke="#c9933a" stroke-width="0.8" fill="none"/>
          <path d="M16 6 L20 12 C22 15 22 19 19 22 C17 24 15 24 13 22 C10 19 10 15 12 12 Z" fill="#c9933a" opacity="0.6"/>
          <circle cx="16" cy="16" r="3" fill="#fff" opacity="0.95"/>
        </svg>
      </div>
      <div style="font-family: 'Cinzel', serif; font-size: 10.5px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: #c9933a; margin-bottom: 8px;">FlowState</div>
      <div style="font-size: 13px; font-style: italic; color: rgba(251, 246, 238, 0.65); letter-spacing: 0.5px;">Returning to stillness...</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
